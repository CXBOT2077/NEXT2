<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 杀手级用例 × 阔折叠屏 vs 常规手机</title>
<style>
  /* ===== 全局样式 & CSS 变量 ===== */
  :root {
    --primary: #6C5CE7;
    --primary-light: #A29BFE;
    --accent: #00CEC9;
    --accent2: #FD79A8;
    --dark: #2D3436;
    --gray: #636E72;
    --light: #DFE6E9;
    --bg: #0F0F1A;
    --card-bg: #1A1A2E;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.1);
    --screen-radius: 22px;
    --transition: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: #E8E8F0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== 背景装饰 ===== */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(108,92,231,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,206,201,0.08) 0%, transparent 50%);
    z-index: 0;
    pointer-events: none;
  }

  /* ===== Header ===== */
  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 48px 24px 32px;
  }
  header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #A29BFE 0%, #00CEC9 50%, #FD79A8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }
  header p {
    font-size: 1.05rem;
    color: rgba(255,255,255,0.55);
    max-width: 680px;
    margin: 0 auto;
    line-height: 1.7;
  }
  .badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    margin: 0 4px;
    vertical-align: middle;
  }
  .badge-wide { background: rgba(108,92,231,0.25); color: #A29BFE; border: 1px solid rgba(108,92,231,0.35); }
  .badge-phone { background: rgba(253,121,168,0.2); color: #FD79A8; border: 1px solid rgba(253,121,168,0.3); }

  /* ===== Main ===== */
  main {
    position: relative; z-index: 1;
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* ===== 屏幕对比区域 ===== */
  .screen-compare {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 48px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .screen-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .screen-label {
    font-size: 0.88rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .screen-label .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .label-wide .dot { background: var(--primary-light); box-shadow: 0 0 8px var(--primary-light); }
  .label-wide { color: var(--primary-light); }
  .label-phone .dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  .label-phone { color: var(--accent2); }

  /* === 设备外壳 === */
  .device {
    position: relative;
    border-radius: var(--screen-radius);
    overflow: hidden;
    transition: var(--transition);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--glass-border);
  }

  /* 16:10 阔折叠屏 — 宽大，偏横向 */
  .device-wide {
    width: 560px;
    height: 350px;
    background: #111122;
    border: 2.5px solid rgba(162,155,254,0.3);
  }

  /* 常规手机 — 窄高 */
  .device-phone {
    width: 192px;
    height: 416px;
    background: #111122;
    border: 2.5px solid rgba(253,121,168,0.25);
  }

  /* 顶部状态栏 */
  .status-bar {
    height: 22px;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.45);
  }
  .status-bar .notch {
    width: 50px; height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
  }

  /* 屏幕内容区 */
  .screen-content {
    width: 100%;
    height: calc(100% - 22px);
    padding: 8px;
    overflow: hidden;
    position: relative;
    transition: var(--transition);
  }

  /* ===== 屏幕内部布局系统 ===== */
  .app-ui {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    gap: 5px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .app-ui.active {
    opacity: 1;
    transform: translateY(0);
  }

  .app-toolbar {
    height: 26px;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 5px;
    flex-shrink: 0;
  }
  .toolbar-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }
  .toolbar-text {
    font-size: 0.55rem;
    color: rgba(255,255,255,0.35);
    margin-left: auto;
  }

  .app-body {
    flex: 1;
    display: flex;
    gap: 5px;
    overflow: hidden;
    min-height: 0;
  }

  .panel {
    border-radius: 8px;
    padding: 7px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    position: relative;
  }
  .panel-primary {
    background: rgba(108,92,231,0.12);
    border: 1px solid rgba(108,92,231,0.2);
  }
  .panel-secondary {
    background: rgba(0,206,201,0.1);
    border: 1px solid rgba(0,206,201,0.18);
  }
  .panel-tertiary {
    background: rgba(253,121,168,0.1);
    border: 1px solid rgba(253,121,168,0.18);
  }
  .panel-neutral {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .panel-header {
    font-size: 0.58rem;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    padding-bottom: 3px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .text-line {
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.08);
  }
  .text-line.w80 { width: 80%; }
  .text-line.w60 { width: 60%; }
  .text-line.w90 { width: 90%; }
  .text-line.w50 { width: 50%; }
  .text-line.w70 { width: 70%; }
  .text-line.highlight { background: rgba(108,92,231,0.3); }
  .text-line.accent { background: rgba(0,206,201,0.25); }
  .text-line.pink { background: rgba(253,121,168,0.25); }

  .code-line {
    height: 4px;
    border-radius: 2px;
    background: rgba(0,206,201,0.15);
  }
  .code-line.indent { margin-left: 10px; }

  .mini-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 5px;
    padding: 4px 6px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .img-placeholder {
    border-radius: 5px;
    background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(0,206,201,0.1));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: rgba(255,255,255,0.25);
    min-height: 30px;
  }

  /* 闪烁光标 */
  .cursor-blink {
    display: inline-block;
    width: 2px; height: 10px;
    background: var(--accent);
    animation: blink 1s infinite;
    margin-left: 3px;
    vertical-align: middle;
  }
  @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }

  /* AI 光效 */
  .ai-glow {
    position: absolute;
    top: 3px; right: 3px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 1; } }

  /* 手机端的"需要切换"遮罩提示 */
  .switch-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 12px 6px 8px;
    text-align: center;
    font-size: 0.52rem;
    color: rgba(255,255,255,0.5);
    pointer-events: none;
  }
  .switch-overlay .switch-icon {
    font-size: 0.85rem;
    display: block;
    margin-bottom: 2px;
  }

  /* 标签页指示器(手机端) */
  .tab-indicator {
    display: flex;
    justify-content: center;
    gap: 3px;
    padding: 4px 0 0;
  }
  .tab-dot-item {
    width: 16px; height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
  }
  .tab-dot-item.active { background: var(--accent2); }

  /* ===== 优势对比文案 ===== */
  .advantage-strip {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-bottom: 44px;
    flex-wrap: wrap;
  }
  .adv-card {
    flex: 1;
    min-width: 280px;
    max-width: 440px;
    padding: 20px 24px;
    border-radius: 16px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    transition: var(--transition);
    opacity: 0;
    transform: translateY(10px);
  }
  .adv-card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .adv-card h3 {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .adv-card.wide-adv h3 { color: var(--primary-light); }
  .adv-card.phone-adv h3 { color: var(--accent2); }
  .adv-card ul {
    list-style: none;
    padding: 0;
  }
  .adv-card ul li {
    font-size: 0.82rem;
    line-height: 1.65;
    color: rgba(255,255,255,0.6);
    padding-left: 16px;
    position: relative;
    margin-bottom: 3px;
  }
  .adv-card.wide-adv ul li::before {
    content: '✓';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }
  .adv-card.phone-adv ul li::before {
    content: '✗';
    position: absolute;
    left: 0;
    color: var(--accent2);
    font-weight: 700;
  }

  /* ===== 用例选择列表 ===== */
  .usecase-nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .usecase-btn {
    padding: 12px 22px;
    border: 1.5px solid var(--glass-border);
    border-radius: 14px;
    background: var(--glass);
    color: rgba(255,255,255,0.6);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
  }
  .usecase-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 0;
  }
  .usecase-btn:hover {
    border-color: rgba(162,155,254,0.4);
    color: #fff;
  }
  .usecase-btn.active {
    border-color: var(--primary-light);
    color: #fff;
    box-shadow: 0 4px 20px rgba(108,92,231,0.3);
  }
  .usecase-btn.active::before { opacity: 0.2; }
  .usecase-btn span {
    position: relative; z-index: 1;
  }
  .usecase-btn .btn-num {
    display: inline-block;
    width: 22px; height: 22px;
    line-height: 22px;
    text-align: center;
    border-radius: 7px;
    background: rgba(255,255,255,0.08);
    font-size: 0.72rem;
    margin-right: 8px;
    font-weight: 800;
  }
  .usecase-btn.active .btn-num {
    background: rgba(255,255,255,0.15);
  }

  /* 进度条(自动轮播) */
  .progress-bar {
    width: 100%;
    max-width: 820px;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    margin: 20px auto 0;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary-light), var(--accent));
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ===== 用例标题区 ===== */
  .usecase-title-area {
    text-align: center;
    margin-bottom: 32px;
    min-height: 60px;
  }
  .usecase-title-area h2 {
    font-size: 1.55rem;
    font-weight: 800;
    color: #fff;
    margin-bottom: 6px;
    transition: var(--transition);
  }
  .usecase-title-area p {
    font-size: 0.92rem;
    color: rgba(255,255,255,0.45);
    transition: var(--transition);
  }

  /* ===== Footer ===== */
  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 32px 24px;
    color: rgba(255,255,255,0.2);
    font-size: 0.78rem;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 1000px) {
    .screen-compare { gap: 28px; }
    .device-wide { width: 460px; height: 287px; }
    .device-phone { width: 160px; height: 347px; }
    header h1 { font-size: 1.8rem; }
  }
  @media (max-width: 720px) {
    .screen-compare { flex-direction: column; align-items: center; }
    .device-wide { width: 92vw; max-width: 480px; height: auto; aspect-ratio: 16/10; }
    .device-phone { width: 48vw; max-width: 192px; height: auto; aspect-ratio: 9/19.5; }
    .advantage-strip { flex-direction: column; align-items: center; }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <h1>AI 杀手级用例 × 屏幕形态对决</h1>
  <p>
    <span class="badge badge-wide">16:10 阔折叠屏</span> vs
    <span class="badge badge-phone">常规手机</span>
    — 5 大 AI 场景深度对比，直观感受大屏在信息密度、交互效率和多任务处理上的碾压级优势
  </p>
</header>

<!-- ===== MAIN ===== -->
<main>

  <!-- 用例标题 -->
  <div class="usecase-title-area">
    <h2 id="ucTitle"></h2>
    <p id="ucSubtitle"></p>
  </div>

  <!-- 双屏对比区域 -->
  <div class="screen-compare">

        </div>
        <div class="screen-content" id="wideScreen">

        </div>
      </div>
    </div>

    <!-- 常规手机 -->
    <div class="screen-wrapper">
      <div class="screen-label label-phone"><span class="dot"></span>常规手机 20:9</div>
      <div class="device device-phone" id="phoneDevice">
        <div class="status-bar">
          <span>9:41</span>
          <span class="notch"></span>
          <span>4G ▉▉</span>
        </div>
        <div class="screen-content" id="phoneScreen">
          <!-- JS 动态注入 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 优势对比文案 -->
  <div class="advantage-strip">
    <div class="adv-card wide-adv" id="advWide">
      <h3><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--primary-light);display:inline-block;"></span> 阔折叠屏优势</h3>
      <ul id="advWideList"></ul>
    </div>
    <div class="adv-card phone-adv" id="advPhone">
      <h3><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--accent2);display:inline-block;"></span> 常规手机局限</h3>
      <ul id="advPhoneList"></ul>
    </div>
  </div>

  <!-- 用例选择按钮 -->
  <nav class="usecase-nav" id="usecaseNav"></nav>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

</main>

<footer>AI Foldable Screen Experience Demo · 2026</footer>

<script>

// ========================================================
// DOM 引用
// ========================================================
const wideScreen    = document.getElementById('wideScreen');
const phoneScreen   = document.getElementById('phoneScreen');
const ucTitle       = document.getElementById('ucTitle');
const ucSubtitle    = document.getElementById('ucSubtitle');
const advWideList   = document.getElementById('advWideList');
const advPhoneList  = document.getElementById('advPhoneList');
const advWide       = document.getElementById('advWide');
const advPhone      = document.getElementById('advPhone');
const usecaseNav    = document.getElementById('usecaseNav');
const progressFill  = document.getElementById('progressFill');

let currentIndex = 0;
let autoTimer    = null;
let progressTimer = null;
const AUTO_INTERVAL = 6000; // 每 6 秒自动切换

// ========================================================
// 生成导航按钮
// ========================================================
useCases.forEach((uc, i) => {
  const btn = document.createElement('button');
  btn.className = 'usecase-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = `<span><span class="btn-num">${i + 1}</span>${uc.name}</span>`;
  btn.addEventListener('click', () => {
    switchTo(i);
    resetAutoPlay(); // 手动切换后重置轮播
  });
  usecaseNav.appendChild(btn);
});

// ========================================================
// 切换用例核心函数
// ========================================================
function switchTo(index) {
  if (index === currentIndex && wideScreen.innerHTML !== '') return;
  currentIndex = index;
  const uc = useCases[index];

  // 先淡出
  wideScreen.style.opacity = 0;
  phoneScreen.style.opacity = 0;
  advWide.classList.remove('active');
  advPhone.classList.remove('active');

  setTimeout(() => {
    // 更新标题
    ucTitle.textContent = uc.name + ' — ' + uc.subtitle;
    ucSubtitle.textContent = `用例 ${index + 1} / ${useCases.length}`;

    // 更新屏幕内容
    wideScreen.innerHTML = uc.wideHTML;
    phoneScreen.innerHTML = uc.phoneHTML;

    // 更新优势文案
    advWideList.innerHTML = uc.wideAdvantages.map(t => `<li>${t}</li>`).join('');
    advPhoneList.innerHTML = uc.phoneLimits.map(t => `<li>${t}</li>`).join('');

    // 淡入
    requestAnimationFrame(() => {
      wideScreen.style.opacity = 1;
      phoneScreen.style.opacity = 1;
      advWide.classList.add('active');
      advPhone.classList.add('active');
    });

    // 更新导航按钮高亮
    document.querySelectorAll('.usecase-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === index);
    });
  }, 280);
}

// ========================================================
// 自动轮播 + 进度条
// ========================================================
function startAutoPlay() {
  let elapsed = 0;
  const step = 50; // 50ms 刷新一次进度条

  progressFill.style.width = '0%';

  progressTimer = setInterval(() => {
    elapsed += step;
    progressFill.style.width = (elapsed / AUTO_INTERVAL * 100) + '%';

    if (elapsed >= AUTO_INTERVAL) {
      elapsed = 0;
      progressFill.style.width = '0%';
      const next = (currentIndex + 1) % useCases.length;
      switchTo(next);
    }
  }, step);
}

function resetAutoPlay() {
  clearInterval(progressTimer);
  startAutoPlay();
}

// 为屏幕内容添加过渡效果
wideScreen.style.transition = 'opacity 0.3s ease';
phoneScreen.style.transition = 'opacity 0.3s ease';

// ========================================================
// 初始化
// ========================================================
switchTo(0);
startAutoPlay();

// ========================================================
// 键盘支持：左右方向键切换
// ========================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    switchTo((currentIndex + 1) % useCases.length);
    resetAutoPlay();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    switchTo((currentIndex - 1 + useCases.length) % useCases.length);
    resetAutoPlay();
  }
});
</script>
</body>
