<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-First 的折叠屏洞察</title>
<style>
:root {
  --bg:#08090d;--surface:#12141c;--surface2:#1a1d28;
  --border:#252838;--text:#e8ecf4;--text2:#7a8199;
  --cyan:#00d4ff;--cyanDim:#0a3a4a;
  --pink:#ff5a8a;--pinkDim:#3a1228;
  --green:#34d399;--greenDim:#0c3225;
  --orange:#f59e42;--orangeDim:#3a2810;
  --purple:#a78bfa;--purpleDim:#231845;
  --fold-pw:181px;--fold-lw:252px;--sam-pw:198px;--bar-pw:111px;--fold-ow:126px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'SF Pro Display','PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
body::before{content:'';position:fixed;top:-30%;left:-20%;width:70vw;height:70vh;background:radial-gradient(ellipse,rgba(0,212,255,.06) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-20%;right:-15%;width:60vw;height:60vh;background:radial-gradient(ellipse,rgba(167,139,250,.05) 0%,transparent 70%);pointer-events:none;z-index:0}

#deck{position:relative;width:100vw;height:100vh;z-index:1}
.slide{
  position:absolute;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;padding:36px 52px;
  opacity:0;pointer-events:none;
  transition:opacity .45s cubic-bezier(.4,0,.2,1),transform .45s cubic-bezier(.4,0,.2,1);
  transform:translateY(12px);
}
.slide.active{opacity:1;pointer-events:auto;transform:translateY(0)}

#progress-bar{position:fixed;bottom:0;left:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));transition:width .5s ease;z-index:100}
#nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:100}
#nav button{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--text2);background:transparent;cursor:pointer;transition:all .35s}
#nav button.active{background:var(--cyan);border-color:var(--cyan);transform:scale(1.4);box-shadow:0 0 8px rgba(0,212,255,.4)}
#page-info{position:fixed;bottom:16px;right:24px;font-size:12px;color:var(--text2);z-index:100;font-variant-numeric:tabular-nums}
#hint{position:fixed;bottom:16px;left:24px;font-size:11px;color:var(--text2);z-index:100;opacity:.4}

.slide-num{font-size:11px;color:var(--cyan);letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;opacity:.8}
h1{font-size:40px;font-weight:700;line-height:1.18;margin-bottom:12px;text-align:center;background:linear-gradient(135deg,var(--text) 60%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h2{font-size:27px;font-weight:600;line-height:1.3;margin-bottom:10px;text-align:center}
.subtitle{font-size:15px;color:var(--text2);line-height:1.65;max-width:780px;text-align:center;margin-bottom:22px}

.glass{background:rgba(18,20,28,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);border-radius:16px}

/* Device */
.devices-row{display:flex;gap:28px;justify-content:center;align-items:flex-end;flex-wrap:wrap}
.device-wrap{display:flex;flex-direction:column;align-items:center;gap:7px}
.device-label{font-size:12px;font-weight:600;text-align:center}
.device-sub{font-size:10px;color:var(--text2);text-align:center}
.device-frame{
  border:1.5px solid var(--border);border-radius:14px;
  overflow:hidden;background:rgba(8,9,13,.85);display:flex;flex-direction:column;
  box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);
  transition:transform .35s,box-shadow .35s;
}
.device-frame:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}
.df-fold-p{width:var(--fold-pw);aspect-ratio:11/16;border-color:rgba(0,212,255,.35)}
.df-fold-l{width:var(--fold-lw);aspect-ratio:16/11;border-color:rgba(0,212,255,.35)}
.df-samsung{width:var(--sam-pw);aspect-ratio:5/6;border-color:rgba(245,158,66,.35)}
.df-bar{width:var(--bar-pw);aspect-ratio:9/20;border-color:rgba(255,90,138,.35)}
.df-fold-outer{width:var(--fold-ow);aspect-ratio:7/10;border-color:rgba(52,211,153,.35)}
.device-screen{flex:1;padding:7px;display:flex;flex-direction:column;gap:3px;overflow:hidden;font-size:10px;min-height:0}
.device-topbar{height:18px;background:linear-gradient(90deg,rgba(255,255,255,.02),rgba(255,255,255,.04));display:flex;align-items:center;padding:0 7px;font-size:8px;color:var(--text2);gap:3px;flex-shrink:0}
.dot{width:4px;height:4px;border-radius:50%}.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}

.panel{border-radius:8px;padding:6px;flex:1;min-height:0;display:flex;flex-direction:column;gap:3px;overflow:hidden}
.panel.ai{background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(0,212,255,.02));border:1px solid rgba(0,212,255,.15)}
.panel.content{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)}
.panel.data{background:linear-gradient(135deg,rgba(52,211,153,.06),rgba(52,211,153,.02));border:1px solid rgba(52,211,153,.12)}
.ptitle{font-size:8px;font-weight:600;margin-bottom:1px;letter-spacing:.5px}
.ptitle.cy{color:var(--cyan)}.ptitle.or{color:var(--orange)}.ptitle.gn{color:var(--green)}.ptitle.pk{color:var(--pink)}.ptitle.pp{color:var(--purple)}
.fl{height:4px;background:rgba(255,255,255,.05);border-radius:3px;margin:1px 0}.fl.s{width:55%}.fl.m{width:75%}
.split-h{display:flex;gap:4px;flex:1;min-height:0}

.tag-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.tag{font-size:10px;padding:3px 10px;border-radius:12px;white-space:nowrap;backdrop-filter:blur(8px)}
.tag.good{background:rgba(0,212,255,.08);color:var(--cyan);border:1px solid rgba(0,212,255,.15)}
.tag.bad{background:rgba(255,90,138,.08);color:var(--pink);border:1px solid rgba(255,90,138,.15)}
.tag.warn{background:rgba(245,158,66,.08);color:var(--orange);border:1px solid rgba(245,158,66,.15)}
.tag.ok{background:rgba(52,211,153,.08);color:var(--green);border:1px solid rgba(52,211,153,.15)}

.stats{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.stat-card{
  background:linear-gradient(145deg,rgba(18,20,28,.8),rgba(26,29,40,.6));
  backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:18px 22px;min-width:150px;text-align:center;
  transition:transform .3s,border-color .3s;
}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.12)}
.stat-card .num{font-size:32px;font-weight:700;margin-bottom:3px;line-height:1}
.stat-card .label{font-size:11px;color:var(--text2);line-height:1.4}

/* Hero glow */
.hero-glow{position:relative}
.hero-glow::before{
  content:'';position:absolute;inset:-2px;border-radius:16px;
  background:conic-gradient(from var(--angle,0deg),var(--cyan),var(--purple),var(--pink),var(--cyan));
  opacity:.45;z-index:-1;filter:blur(6px);animation:rotGlow 4s linear infinite;
}
@keyframes rotGlow{to{--angle:360deg}}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}

/* Bar chart */
.bar-row{display:flex;align-items:center;gap:10px;margin:5px 0}
.bar-label{font-size:12px;width:115px;text-align:right;color:var(--text2);flex-shrink:0}
.bar-track{flex:1;height:28px;background:var(--surface);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:600;width:0;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.bar-fill.cy{background:linear-gradient(90deg,rgba(0,212,255,.6),rgba(0,212,255,.15))}
.bar-fill.or{background:linear-gradient(90deg,rgba(245,158,66,.55),rgba(245,158,66,.12))}
.bar-fill.pk{background:linear-gradient(90deg,rgba(255,90,138,.55),rgba(255,90,138,.12))}

.insight-box{background:linear-gradient(135deg,rgba(0,212,255,.04),rgba(167,139,250,.04));border:1px solid rgba(0,212,255,.12);border-radius:14px;padding:16px 20px;font-size:14px;line-height:1.7;max-width:800px;backdrop-filter:blur(8px)}

.flow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:center}
.flow-step{padding:4px 12px;border-radius:16px;font-size:11px;border:1px solid var(--border);background:var(--surface);transition:background .3s}
.flow-step:hover{background:var(--surface2)}
.flow-arrow{color:var(--text2);font-size:13px}

/* Paradigm */
.paradigm-row{display:flex;gap:24px;justify-content:center;align-items:stretch;margin:14px 0;flex-wrap:wrap}
.paradigm-card{
  background:linear-gradient(145deg,rgba(18,20,28,.7),rgba(26,29,40,.5));
  backdrop-filter:blur(12px);border-radius:16px;padding:22px;
  flex:1;max-width:360px;min-width:260px;
  border:1px solid var(--border);display:flex;flex-direction:column;gap:10px;
  transition:border-color .3s,transform .3s;
}
.paradigm-card:hover{border-color:rgba(255,255,255,.1);transform:translateY(-2px)}
.paradigm-card h3{font-size:15px;font-weight:600}
.paradigm-card p{font-size:12px;color:var(--text2);line-height:1.6}

/* Spectrum */
.spectrum{display:flex;align-items:flex-end;gap:14px;justify-content:center;margin:18px 0}
.spectrum-item{display:flex;flex-direction:column;align-items:center;gap:5px;transition:transform .3s}
.spectrum-item:hover{transform:translateY(-4px)}
.spectrum-bar{border-radius:10px 10px 4px 4px;transition:height .8s cubic-bezier(.22,1,.36,1);height:0}
.spectrum-label{font-size:10px;color:var(--text2);text-align:center;line-height:1.4}

.mini-bars{display:flex;align-items:flex-end;gap:3px;height:28px;margin-top:auto}
.mini-bar{width:8px;border-radius:2px 2px 0 0}

/* ---- Animations ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.anim-up{opacity:0;animation:fadeUp .6s ease-out both}
.anim-d1{animation-delay:.1s}.anim-d2{animation-delay:.2s}.anim-d3{animation-delay:.3s}.anim-d4{animation-delay:.4s}.anim-d5{animation-delay:.5s}

@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 4px currentColor}50%{opacity:.5;box-shadow:0 0 14px currentColor}}
.glow-dot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:pulse 2s ease-in-out infinite}

/* Paradigm arrow animated */
@keyframes arrowPulse{0%,100%{opacity:.3;transform:translateX(0)}50%{opacity:1;transform:translateX(6px)}}
.paradigm-arrow-anim{display:flex;align-items:center;font-size:32px;color:var(--cyan);flex-shrink:0;animation:arrowPulse 2s ease-in-out infinite}

/* Icon anim */
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.float-icon{display:inline-block;animation:floatIcon 3s ease-in-out infinite}

/* Shimmer line for paradigm */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer-line{height:1px;background:linear-gradient(90deg,transparent 30%,rgba(0,212,255,.3) 50%,transparent 70%);background-size:200% 100%;animation:shimmer 3s ease-in-out infinite;margin:8px 0}

/* Orbit for summary */
@keyframes orbit{from{transform:rotate(0deg) translateX(120px) rotate(0deg)}to{transform:rotate(360deg) translateX(120px) rotate(-360deg)}}
.orbit-ring{position:absolute;width:240px;height:240px;border:1px solid rgba(0,212,255,.06);border-radius:50%;top:50%;left:50%;margin-top:-120px;margin-left:-120px;pointer-events:none}
.orbit-dot{width:6px;height:6px;border-radius:50%;position:absolute;top:50%;left:50%;margin:-3px;animation:orbit linear infinite}

/* Card entrance for summary */
@keyframes cardPop{from{opacity:0;transform:scale(.85) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.card-pop{opacity:0;animation:cardPop .5s cubic-bezier(.22,1,.36,1) both}

@media(max-width:960px){
  .slide{padding:18px 14px}h1{font-size:26px}h2{font-size:20px}
  :root{--fold-pw:140px;--fold-lw:196px;--sam-pw:154px;--bar-pw:86px;--fold-ow:98px}
  .devices-row{gap:12px}.paradigm-row{gap:12px}
}
</style>
</head>
<body>

<div id="progress-bar"></div>
<div id="nav"></div>
<div id="page-info"></div>
<div id="hint">← → 方向键 / 点击翻页</div>

// === Engine ===
const deck=document.getElementById('deck'),nav=document.getElementById('nav'),bar=document.getElementById('progress-bar'),info=document.getElementById('page-info');
let cur=0;
SLIDES.forEach((s,i)=>{
  const d=document.createElement('div');
  d.className='slide'+(i===0?' active':'');
  d.innerHTML=s.html;
  if(s.id) d.dataset.sid=s.id;
  deck.appendChild(d);
  const b=document.createElement('button');b.className=i===0?'active':'';b.onclick=()=>go(i);nav.appendChild(b);
});

function go(idx){
  if(idx<0||idx>=SLIDES.length||idx===cur)return;
  const sl=deck.querySelectorAll('.slide'),bt=nav.querySelectorAll('button');
  sl[cur].classList.remove('active');bt[cur].classList.remove('active');
  cur=idx;
  sl[cur].classList.add('active');bt[cur].classList.add('active');
  bar.style.width=((cur+1)/SLIDES.length*100)+'%';
  info.textContent=(cur+1)+' / '+SLIDES.length;
  onSlideEnter(sl[cur]);
}

function onSlideEnter(slide){
  const sid=slide.dataset.sid;
  // Bar chart grow animation
  if(sid==='bars'){
    setTimeout(()=>{
      slide.querySelectorAll('.bar-fill[data-w]').forEach((el,i)=>{
        setTimeout(()=>{ el.style.width=el.dataset.w; },i*80);
      });
    },200);
  }
  // Spectrum bar grow
  if(sid==='spectrum'){
    setTimeout(()=>{
      slide.querySelectorAll('.spectrum-bar[data-h]').forEach((el,i)=>{
        setTimeout(()=>{ el.style.height=el.dataset.h+'px'; },i*120);
      });
    },200);
  }
  // Paradigm card entrance
  if(sid==='paradigm'){
    const cards=slide.querySelectorAll('.paradigm-card');
    cards.forEach((c,i)=>{
      c.style.opacity='0';c.style.transform='translateY(16px)';
      setTimeout(()=>{c.style.transition='all .5s ease-out';c.style.opacity='1';c.style.transform='translateY(0)';},200+i*200);
    });
  }
}

// Init first slide bars (if applicable)
bar.style.width=(1/SLIDES.length*100)+'%';
info.textContent='1 / '+SLIDES.length;

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(cur+1)}
  else if(e.key==='ArrowLeft'){e.preventDefault();go(cur-1)}
});
document.addEventListener('click',e=>{
  if(e.target.closest('#nav'))return;
  const x=e.clientX/window.innerWidth;
  if(x>.6)go(cur+1);else if(x<.4)go(cur-1);
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){dx<0?go(cur+1):go(cur-1)}
},{passive:true});
</script>
</body>
</html>
